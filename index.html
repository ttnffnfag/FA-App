<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>售服回報系統</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1115">
<link rel="apple-touch-icon" href="icon.png">

<style>

html{font-size:150%;}

body{
    margin:0;
    font-family:"Microsoft JhengHei";
    background:#0f1115;
    color:#e6e6e6;
}

.container{
    max-width:720px;
    margin:auto;
    padding:15px;
}

h1{
    text-align:center;
    font-size:20px;
    margin:10px 0 20px;
}

.card{
    background:#1a1d24;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}

label{
    font-size:12px;
    color:#aaa;
    display:block;
    margin-bottom:6px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #333;
    background:#0f1115;
    color:#fff;
    box-sizing:border-box;
}

textarea{min-height:70px;}

.radio{display:flex;gap:20px;}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
}

.btn1{background:#3b82f6;color:#fff;}
.btn2{background:#22c55e;color:#fff;}
.btn3{background:#6b7280;color:#fff;}

.output{
    white-space:pre-wrap;
    background:#0b0d10;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>售服異常回報</h1>

<!-- 地點 -->
<div class="card">
<label>地點</label>
<input id="location" list="locationList" placeholder="請選或輸入">
<datalist id="locationList">
<option value="中壢"><option value="龍潭"><option value="竹南">
<option value="台中"><option value="嘉義"><option value="台南"><option value="高雄">
</datalist>
</div>

<!-- 客戶 -->
<div class="card">
<label>客戶</label>
<input id="customer" list="customerList" placeholder="請選或輸入">
<datalist id="customerList">
<option value="台積電"><option value="日月光"><option value="矽品">
<option value="力成"><option value="美光"><option value="精材">
</datalist>
</div>

<!-- 廠區 -->
<div class="card">
<label>廠區</label>
<input id="factory" list="factoryList" placeholder="請選或輸入">
<datalist id="factoryList">
<option value="AP2"><option value="AP5"><option value="AP6"><option value="K18">
</datalist>
</div>

<!-- 機型 -->
<div class="card">
<label>機型</label>
<input id="model" list="modelList" placeholder="請選或輸入">
<datalist id="modelList">
<option value="SC103"><option value="SC104"><option value="SC106">
<option value="SC106F"><option value="SC106FV"><option value="SC107">
<option value="SC201"><option value="SC202"><option value="SC4200">
</datalist>
</div>

<!-- 設備 -->
<div class="card">
<label>廠內設備編號</label>
<input id="eqInternal" placeholder="可填 NA">
</div>

<div class="card">
<label>客戶設備編號</label>
<input id="eqCustomer" placeholder="可填 NA">
</div>

<!-- 日期 -->
<div class="card">
<label>日期</label>
<input type="date" id="date">
</div>

<!-- 時間 -->
<div class="card">
<label>時間</label>
<input type="time" id="time">
</div>

<!-- 人員 -->
<div class="card">
<label>佳宸人員</label>
<input id="person">
</div>

<div class="card">
<label>客戶通報人員</label>
<input id="reportPerson">
</div>

<!-- 異常 -->
<div class="card">
<label>異常原因</label>
<input id="type" list="typeList" placeholder="請選或輸入">
<datalist id="typeList">
<option value="硬體"><option value="軟體">
</datalist>
</div>

<div class="card">
<label>異常簡述</label>
<textarea id="desc"></textarea>
</div>

<!-- 再現 -->
<div class="card">

<label>是否再現</label>

<div class="radio">
<label><input type="radio" name="rep" value="是" onclick="updateRepUI()">是</label>
<label><input type="radio" name="rep" value="否" onclick="updateRepUI()">否</label>
</div>

<label>再現狀態</label>
<input id="repType" list="repList" placeholder="請選或輸入">
<datalist id="repList">
<option value="開機"><option value="運轉中"><option value="待機">
<option value="Recipe切換"><option value="上下料">
<option value="Alarm Reset後"><option value="長時間運轉">
</datalist>

<textarea id="repDetail" placeholder="補充資訊"></textarea>

</div>

<!-- 更新 -->
<div class="card">

<label>是否重大更新</label>

<div class="radio">
<label><input type="radio" name="upd" value="是" onclick="updateUpdUI()">是</label>
<label><input type="radio" name="upd" value="否" onclick="updateUpdUI()">否</label>
</div>

<label>更新類型</label>
<input id="updType" list="updList" onchange="updateTypeUI()" placeholder="請選或輸入">
<datalist id="updList">
<option value="PLC"><option value="PC軟體"><option value="Recipe">
<option value="參數"><option value="Sensor更換"><option value="Valve更換">
<option value="機構"><option value="管路"><option value="電控"><option value="電氣元件"><option value="其他">
</datalist>

<div class="card" id="dynBlock" style="display:none;">
<label>補充資訊</label>
<textarea id="dynText"></textarea>
</div>

</div>

<!-- 交叉比對 -->
<div class="card">

<label>交叉比對</label>

<input id="cross" list="crossList" onchange="updateCrossUI()" placeholder="請選或輸入">
<datalist id="crossList">
<option value="YES"><option value="NO">
</datalist>

<div class="card" id="crossBlock" style="display:none;">
<label>補充資訊</label>
<textarea id="crossDetail"></textarea>
</div>

</div>

<button class="btn1" onclick="gen()">產生回報</button>
<button class="btn2" onclick="copy()">複製內容</button>
<button id="uploadBtn" class="btn2" onclick="upload()">上傳 Google Sheet</button>
<button class="btn3" onclick="location.reload()">清空</button>

<pre class="output" id="out"></pre>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxRKuNdkqxeay1vxtQATbjkgn09D5evTAXw529PJoiz8whdhLEqrIaiCvzyASyrwioh/exec";

// ===== 再現 =====
function updateRepUI(){

let rep=document.querySelector('input[name="rep"]:checked')?.value;

let type=document.getElementById("repType");
let detail=document.getElementById("repDetail");

if(rep==="是"){
    type.disabled=false;
    detail.disabled=false;
}else{
    type.value="";
    detail.value="";
    type.disabled=true;
    detail.disabled=true;
}
}

// ===== 重大更新互鎖 =====
function updateUpdUI(){

let upd=document.querySelector('input[name="upd"]:checked')?.value;

let updType=document.getElementById("updType");
let dynBlock=document.getElementById("dynBlock");
let dynText=document.getElementById("dynText");

if(upd==="是"){
    updType.disabled=false;
}else{
    updType.value="";
    updType.disabled=true;
    dynBlock.style.display="none";
    dynText.value="";
}
}

// ===== 更新類型 =====
function updateTypeUI(){

let upd=document.querySelector('input[name="upd"]:checked')?.value;
let block=document.getElementById("dynBlock");
let text=document.getElementById("dynText");

let v=document.getElementById("updType").value;

if(upd!=="是"){
    block.style.display="none";
    text.value="";
    return;
}

if(v!==""){
    block.style.display="block";
}else{
    block.style.display="none";
    text.value="";
}
}

// ===== 交叉比對 =====
function updateCrossUI(){

let v=document.getElementById("cross").value;

let block=document.getElementById("crossBlock");
let text=document.getElementById("crossDetail");

if(v==="YES"){
    block.style.display="block";
}else{
    block.style.display="none";
    text.value="";
}
}

// ===== 必填 =====
function must(id,name){
let el=document.getElementById(id);
if(!el.value){
    alert(name+" 未填");
    el.focus();
    return false;
}
return true;
}

function mustRadio(name,label){
let v=document.querySelector('input[name="'+name+'"]:checked');
if(!v){
    alert(label+" 未選");
    return false;
}
return v.value;
}

function mustEither(id1,id2,label){
let a=document.getElementById(id1).value.trim();
let b=document.getElementById(id2).value.trim();
if(!a && !b){
    alert(label+" 至少填一個");
    return false;
}
return true;
}

function getValue(id){
return document.getElementById(id).value;
}

// ===== 產生 =====
function gen(){

if(!must("location","地點")) return;
if(!must("customer","客戶")) return;
if(!must("factory","廠區")) return;
if(!must("model","機型")) return;

if(!mustEither("eqInternal","eqCustomer","設備編號")) return;

if(!must("date","日期")) return;
if(!must("time","時間")) return;

if(!must("person","佳宸人員")) return;
if(!must("reportPerson","客戶通報人員")) return;

if(!must("type","異常原因")) return;
if(!must("desc","異常簡述")) return;

let rep=mustRadio("rep","是否再現");
if(rep==="是"){
    if(!must("repType","再現狀態")) return;
    if(!must("repDetail","再現補充")) return;
}

let upd=mustRadio("upd","是否重大更新");
if(upd==="是"){
    if(!must("updType","更新類型")) return;
}

let cross=document.getElementById("cross").value;

let t=`
=== 售服回報 ===

地點:${getValue("location")}
客戶:${getValue("customer")}
廠區:${getValue("factory")}
機型:${getValue("model")}

廠內設備:${eqInternal.value || "NA"}
客戶設備:${eqCustomer.value || "NA"}

日期:${date.value}
時間:${time.value}

佳宸人員:${person.value}
客戶通報人員:${reportPerson.value}

異常原因:${type.value}
異常描述:${desc.value}

是否再現:${rep}
再現狀態:${rep==="是" ? repType.value : "無"}
再現補充:${rep==="是" ? repDetail.value : ""}

重大更新:${upd || "未選"}

更新類型:${upd==="是" ? updType.value : "無"}
更新補充:${upd==="是" ? dynText.value : ""}

交叉比對:${cross==="YES" ? "可以" : "不可以"}
交叉補充:${cross==="YES" ? crossDetail.value : ""}
`;

document.getElementById("out").innerText=t;
}

// ===== 複製 =====
function copy(){
navigator.clipboard.writeText(document.getElementById("out").innerText);
alert("已複製");
}

// ===== 上傳 =====
async function upload(){

const btn = document.getElementById("uploadBtn");

// 🔒 防重複點擊
btn.disabled = true;
btn.innerText = "上傳中...";

try{

gen(); // 先產生內容

if(!out.innerText){
    throw new Error("無資料");
}

let data={

location:getValue("location"),
customer:getValue("customer"),
factory:getValue("factory"),
model:getValue("model"),

eqInternal:eqInternal.value,
eqCustomer:eqCustomer.value,

date:date.value,
time:time.value,

person:person.value,
reportPerson:reportPerson.value,

type:type.value,
desc:desc.value,

rep:document.querySelector('input[name="rep"]:checked')?.value || "",
repType:repType.value,
repDetail:repDetail.value,

updType:updType.value,
dynText:dynText.value,

cross:cross.value==="YES" ? "可以" : "不可以",
crossDetail:crossDetail.value

};

let res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
});

if(!res.ok){
    throw new Error("上傳失敗");
}

alert("上傳成功");

}catch(err){

console.log(err);
alert("上傳失敗");

}finally{

// 🔓 一定要解鎖（成功或失敗都會執行）
btn.disabled = false;
btn.innerText = "上傳 Google Sheet";

}

}

// init
updateRepUI();
updateUpdUI();

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
