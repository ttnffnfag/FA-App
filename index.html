<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>售服回報系統</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1115">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{
    margin:0;
    font-family:"Microsoft JhengHei";
    background:#0f1115;
    color:#e6e6e6;
}

.container{max-width:720px;margin:auto;padding:15px;}

h1{text-align:center;font-size:20px;margin:10px 0 20px;}

.card{
    background:#1a1d24;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}

label{font-size:12px;color:#aaa;display:block;margin-bottom:6px;}

input,select,textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #333;
    background:#0f1115;
    color:#fff;
    box-sizing:border-box;
}

textarea{min-height:70px;}

.radio{display:flex;gap:20px;}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

.btn1{background:#3b82f6;color:#fff;}
.btn2{background:#22c55e;color:#fff;}
.btn3{background:#6b7280;color:#fff;}

.output{
    white-space:pre-wrap;
    background:#0b0d10;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}
    html{font-size:150%;}
</style>
</head>

<body>

<div class="container">

<h1>售服異常回報</h1>

<!-- 地點 -->
<div class="card">
<label>地點</label>
<select id="location">
<option value="">請選擇</option>
<option>中壢</option><option>龍潭</option><option>竹南</option>
<option>台中</option><option>嘉義</option><option>台南</option><option>高雄</option>
<option value="OTHER">其他</option>
</select>
</div>

<!-- 客戶 -->
<div class="card">
<label>客戶</label>
<select id="customer">
<option value="">請選擇</option>
<option>台積電</option><option>日月光</option><option>矽品</option>
<option>力成</option><option>美光</option><option>精材</option>
<option value="OTHER">其他</option>
</select>
</div>

<!-- 廠區 -->
<div class="card">
<label>廠區</label>
<select id="factory">
<option value="">請選擇</option>
<option>AP2</option><option>AP5</option><option>AP6</option><option>K18</option>
<option value="OTHER">其他</option>
</select>
</div>

<!-- 機型 -->
<div class="card">
<label>機型</label>
<select id="model">
<option value="">請選擇</option>
<option>SC103</option><option>SC104</option><option>SC106</option>
<option>SC106F</option><option>SC106FV</option><option>SC107</option>
<option value="OTHER">其他</option>
</select>
</div>

<!-- 設備 -->
<div class="card">
<label>廠內設備編號</label>
<input id="eqInternal" placeholder="可填 NA">
</div>

<div class="card">
<label>客戶設備編號</label>
<input id="eqCustomer" placeholder="可填 NA">
</div>

<!-- 日期時間 -->
<div class="card">
<label>日期</label>
<input type="date" id="date">
</div>

<div class="card">
<label>時間</label>
<input type="time" id="time">
</div>

<!-- 人員 -->
<div class="card">
<label>佳宸人員</label>
<input id="person">
</div>

<div class="card">
<label>客戶通報人員</label>
<input id="reportPerson">
</div>

<!-- 異常 -->
<div class="card">
<label>異常原因</label>
<select id="type">
<option value="">請選擇</option>
<option>硬體</option>
<option>軟體</option>
</select>
</div>

<div class="card">
<label>異常簡述</label>
<textarea id="desc"></textarea>
</div>

<!-- 再現 -->
<div class="card">
<label>是否再現</label>
<div class="radio">
<label><input type="radio" name="rep" value="是" onclick="updateRepUI()">是</label>
<label><input type="radio" name="rep" value="否" onclick="updateRepUI()">否</label>
</div>

<label>再現狀態</label>
<select id="repType">
<option value="">請選擇</option>
<option>開機</option><option>運轉中</option><option>待機</option>
</select>

<textarea id="repDetail"></textarea>
</div>

<!-- 更新 -->
<div class="card">
<label>是否重大更新</label>
<div class="radio">
<label><input type="radio" name="upd" value="是">是</label>
<label><input type="radio" name="upd" value="否">否</label>
</div>

<label>更新類型</label>
<select id="updType" onchange="updateTypeUI()">
<option value="">請選擇</option>
<option>PLC</option>
<option>PC軟體</option>
<option>Recipe</option>
<option>參數</option>
<option>Sensor更換</option>
<option>Valve更換</option>
<option>機構</option>
<option>管路</option>
<option>電控</option>
<option>電氣元件</option>
</select>

<div class="card" id="dynBlock" style="display:none;">
<label>補充資訊</label>
<textarea id="dynText"></textarea>
</div>

<!-- 交叉比對 -->
<label>交叉比對</label>
<select id="cross" onchange="updateCrossUI()">
<option value="">請選擇</option>
<option value="YES">可以</option>
<option value="NO">不可以</option>
</select>

<div class="card" id="crossBlock" style="display:none;">
<label>補充資訊</label>
<textarea id="crossDetail"></textarea>
</div>

<button class="btn1" onclick="gen()">產生</button>
<button class="btn2" onclick="copy()">複製</button>
<button class="btn3" onclick="location.reload()">清空</button>

<pre class="output" id="out"></pre>

</div>

<script>

// ===== 再現控制 =====
function updateRepUI(){
let rep=document.querySelector('input[name="rep"]:checked')?.value;
let t=document.getElementById("repType");
let d=document.getElementById("repDetail");

if(rep==="是"){
    t.disabled=false;
    d.disabled=false;
}else{
    t.value="";
    d.value="";
    t.disabled=true;
    d.disabled=true;
}
}
updateRepUI();

// ===== 更新類型 =====
function updateTypeUI(){
let block=document.getElementById("dynBlock");
let text=document.getElementById("dynText");

block.style.display="none";
text.value="";

let v=document.getElementById("updType").value;
if(v!==""){
    block.style.display="block";
}
}

// ===== 交叉比對 =====
function updateCrossUI(){
let v=document.getElementById("cross").value;
let block=document.getElementById("crossBlock");
let text=document.getElementById("crossDetail");

if(v==="YES"){
    block.style.display="block";
}else{
    block.style.display="none";
    text.value="";
}
}

// ===== 必填 =====
function must(id,name){
let el=document.getElementById(id);
if(!el.value){
alert(name+" 未填");
el.focus();
return false;
}
return true;
}

function mustRadio(name,label){
let v=document.querySelector('input[name="'+name+'"]:checked');
if(!v){
alert(label+" 未選");
return false;
}
return v.value;
}

function mustEither(id1,id2,label){
let a=document.getElementById(id1).value.trim();
let b=document.getElementById(id2).value.trim();
if(!a && !b){
alert(label+" 至少填一個");
return false;
}
return true;
}

function getValue(id){
return document.getElementById(id).value;
}

// ===== 產生 =====
function gen(){

if(!must("location","地點")) return;
if(!must("customer","客戶")) return;
if(!must("factory","廠區")) return;
if(!must("model","機型")) return;

if(!mustEither("eqInternal","eqCustomer","設備編號")) return;

if(!must("date","日期")) return;
if(!must("time","時間")) return;

if(!must("person","佳宸人員")) return;
if(!must("reportPerson","客戶通報人員")) return;

if(!must("type","異常原因")) return;
if(!must("desc","異常描述")) return;

let rep=mustRadio("rep","是否再現");
if(rep==="是"){
if(!must("repType","再現狀態")) return;
if(!must("repDetail","再現描述")) return;
}

let cross=document.getElementById("cross").value;

let t=`
=== 售服回報 ===

地點:${getValue("location")}
客戶:${getValue("customer")}
廠區:${getValue("factory")}
機型:${getValue("model")}

設備:${eqInternal.value || "NA"} / ${eqCustomer.value || "NA"}

時間:${date.value} ${time.value}

人員:${person.value}
通報:${reportPerson.value}

原因:${type.value}
描述:${desc.value}

再現:${rep}

更新:${updType.value}
補充:${dynText.value}

交叉:${cross==="YES"?"可以":"不可以"}
補充:${cross==="YES"?crossDetail.value:""}
`;

document.getElementById("out").innerText=t;
}

// ===== 複製 =====
function copy(){
navigator.clipboard.writeText(out.innerText);
alert("已複製");
}

// ===== SW =====
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
