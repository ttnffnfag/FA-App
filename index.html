<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>售服回報系統</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1115">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{
    margin:0;
    font-family:"Microsoft JhengHei";
    background:#0f1115;
    color:#e6e6e6;
}

.container{max-width:720px;margin:auto;padding:15px;}

h1{text-align:center;font-size:20px;margin:10px 0 20px;}

.card{
    background:#1a1d24;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}

label{font-size:12px;color:#aaa;display:block;margin-bottom:6px;}

input,select,textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #333;
    background:#0f1115;
    color:#fff;
    box-sizing:border-box;
}

textarea{min-height:70px;}

.radio{display:flex;gap:20px;}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

.btn1{background:#3b82f6;color:#fff;}
.btn2{background:#22c55e;color:#fff;}
.btn3{background:#6b7280;color:#fff;}

.output{
    white-space:pre-wrap;
    background:#0b0d10;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>售服異常回報</h1>

<!-- 地點 -->
<div class="card">
<label>地點</label>
<select id="location">
<option value="">請選擇</option>
<option>中壢</option><option>龍潭</option><option>竹南</option>
<option>台中</option><option>嘉義</option><option>台南</option><option>高雄</option>
<option value="OTHER">其他</option>
</select>
</div>

<!-- 客戶 -->
<div class="card">
<label>客戶</label>
<select id="customer">
<option value="">請選擇</option>
<option>台積電</option><option>日月光</option><option>矽品</option>
<option>力成</option><option>美光</option><option>精材</option>
<option value="OTHER">其他</option>
</select>
</div>

<!-- 廠區 -->
<div class="card">
<label>廠區</label>
<select id="factory">
<option value="">請選擇</option>
<option>AP2</option><option>AP5</option><option>AP6</option><option>K18</option>
<option value="OTHER">其他</option>
</select>
</div>

<!-- 機型 -->
<div class="card">
<label>機型</label>
<select id="model">
<option value="">請選擇</option>
<option>SC103</option><option>SC104</option><option>SC106</option>
<option>SC106F</option><option>SC106FV</option><option>SC107</option>
<option value="OTHER">其他</option>
</select>
</div>

<!-- 設備編號 -->
<div class="card">
<label>廠內設備編號</label>
<input id="eqInternal" placeholder="可填 NA">
</div>

<div class="card">
<label>客戶設備編號</label>
<input id="eqCustomer" placeholder="可填 NA">
</div>

<!-- 日期時間 -->
<div class="card">
<label>日期</label>
<input type="date" id="date">
</div>

<div class="card">
<label>時間</label>
<input type="time" id="time">
</div>

<!-- 人員 -->
<div class="card">
<label>佳宸人員</label>
<input id="person">
</div>

<div class="card">
<label>客戶通報人員</label>
<input id="reportPerson">
</div>

<!-- 異常 -->
<div class="card">
<label>異常原因</label>
<select id="type">
<option value="">請選擇</option>
<option>硬體</option>
<option>軟體</option>
</select>
</div>

<div class="card">
<label>異常簡述</label>
<textarea id="desc"></textarea>
</div>

<!-- 再現 -->
<div class="card">
<label>是否再現</label>
<div class="radio">
<label><input type="radio" name="rep" value="是" onclick="updateRepUI()">是</label>
<label><input type="radio" name="rep" value="否" onclick="updateRepUI()">否</label>
</div>

<label>再現狀態</label>
<select id="repType">
<option value="">請選擇</option>
<option>開機</option><option>運轉中</option><option>待機</option>
</select>

<textarea id="repDetail"></textarea>
</div>

<!-- 歷史 -->
<div class="card">
<label>是否曾發生</label>
<div class="radio">
<label><input type="radio" name="his" value="是">是</label>
<label><input type="radio" name="his" value="否">否</label>
</div>

<label>多久前</label>
<select id="hisTime">
<option value="">請選擇</option>
<option>1天內</option><option>1週內</option><option>1個月內</option>
</select>

<label>次數</label>
<select id="hisCount">
<option value="">請選擇</option>
<option>1次</option><option>2~5次</option>
</select>

<textarea id="hisDetail"></textarea>
</div>

<!-- 更新 -->
<div class="card">
<label>是否重大更新</label>
<div class="radio">
<label><input type="radio" name="upd" value="是">是</label>
<label><input type="radio" name="upd" value="否">否</label>
</div>

<label>更新類型</label>
<select id="updType">
<option value="">請選擇</option>
<option>PLC更新</option><option>PC軟體更新</option>
</select>

<label>交叉比對</label>
<select id="cross">
<option value="">請選擇</option>
<option>可以</option><option>不可以</option>
</select>

<textarea id="updDetail"></textarea>
</div>

<button class="btn1" onclick="gen()">產生</button>
<button class="btn2" onclick="copy()">複製</button>
<button class="btn3" onclick="location.reload()">清空</button>

<pre class="output" id="out"></pre>

</div>

<script>

// ===== 必填 =====
function must(id,name){
  let el=document.getElementById(id);
  if(!el.value){
    alert(name+" 未填");
    el.focus();
    return false;
  }
  return true;
}

function mustRadio(name,label){
  let v=document.querySelector('input[name="'+name+'"]:checked');
  if(!v){
    alert(label+" 未選");
    return false;
  }
  return v.value;
}

function mustEither(id1,id2,label){
  let v1=document.getElementById(id1).value.trim();
  let v2=document.getElementById(id2).value.trim();

  if(!v1 && !v2){
    alert(label+"（廠內 / 客戶）至少要填一個");
    return false;
  }
  return true;
}

function getValue(id){
  return document.getElementById(id).value;
}

// ===== 再現互鎖 =====
function updateRepUI(){
  let rep=document.querySelector('input[name="rep"]:checked')?.value;

  let type=document.getElementById("repType");
  let detail=document.getElementById("repDetail");

  if(rep==="是"){
    type.disabled=false;
    detail.disabled=false;
  }else{
    type.value="";
    detail.value="";
    type.disabled=true;
    detail.disabled=true;
  }
}

updateRepUI();

// ===== 產生 =====
function gen(){

if(!must("location","地點")) return;
if(!must("customer","客戶")) return;
if(!must("factory","廠區")) return;
if(!must("model","機型")) return;

// 設備編號
if(!mustEither("eqInternal","eqCustomer","設備編號")) return;

if(!must("date","日期")) return;
if(!must("time","時間")) return;

if(!must("person","佳宸人員")) return;
if(!must("reportPerson","客戶通報人員")) return;

if(!must("type","異常原因")) return;
if(!must("desc","異常簡述")) return;

let rep=mustRadio("rep","是否再現");
if(!rep) return;

if(rep==="是"){
  if(!must("repType","再現狀態")) return;
  if(!must("repDetail","再現描述")) return;
}

let his=mustRadio("his","是否曾發生");
if(!his) return;

if(!must("hisTime","多久前")) return;
if(!must("hisCount","次數")) return;

let upd=mustRadio("upd","是否更新");
if(!upd) return;

if(!must("updType","更新類型")) return;
if(!must("cross","交叉比對")) return;

// 產生
let t=`
=== 售服回報 ===

地點:${getValue("location")}
客戶:${getValue("customer")}
廠區:${getValue("factory")}
機型:${getValue("model")}

廠內設備編號:${getValue("eqInternal") || "NA"}
客戶設備編號:${getValue("eqCustomer") || "NA"}

時間:${date.value} ${time.value}

佳宸人員:${person.value}
客戶通報人員:${reportPerson.value}

原因:${type.value}
描述:${desc.value}

再現:${rep}
狀態:${rep==="是"?repType.value:"無"}
${rep==="是"?repDetail.value:""}

歷史:${his}
多久:${hisTime.value}
次數:${hisCount.value}
${hisDetail.value}

更新:${upd}
類型:${updType.value}
交叉:${cross.value}
${updDetail.value}
`;

document.getElementById("out").innerText=t;
}

// ===== 複製 =====
function copy(){
navigator.clipboard.writeText(out.innerText);
alert("已複製");
}

</script>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
